<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Өнөөдөр Болзох урилга 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Утсан дээр дарахад цэнхэр хүрээ гаргахгүй */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6f2; /* Зөөлөн ягаан дэвсгэр */
            overflow: hidden;
            padding: 20px;
        }

        /* Картны ерөнхий загвар (Утсанд зориулсан хэмжээ) */
        .card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(255, 102, 163, 0.15);
            text-align: center;
            width: 100%;
            max-width: 340px;
            position: relative;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h2 {
            color: #4a1525;
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Товчлууруудын контейнер */
        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            height: 60px;
            margin-top: 10px;
            padding: 0 10px;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #yesBtn {
            background-color: #ff66a3;
            color: white;
            z-index: 10; /* Тийм товч үргэлж дээр нь байна */
        }

        /* Үгүй товчлуур утсан дээр чөлөөтэй зугтах хэсэг */
        #noBtn {
            background-color: #e5cbd9;
            color: #604d59;
            position: absolute;
            right: 10px; /* Эхлэх байрлал */
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.1) !important;
            touch-action: none; /* Утсан дээр scroll хийхийг хориглоно */
            z-index: 5;
        }

        /* 2-р хуудас: Хоолны сонголтууд */
        .food-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .food-item {
            background: #fff0f5;
            padding: 15px 10px;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .food-item:active {
            transform: scale(0.95);
            background: #ffe6f2;
            border-color: #ff66a3;
        }

        .food-item span {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }

        .food-item p {
            font-size: 13px;
            color: #4a1525;
            font-weight: 600;
        }

        /* Нуух ангилал */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="page1" class="card">
        <img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?w=400" alt="Cute" class="profile-img">
        <h2>🌸 Салхилах уу хөөрхөнөө? 🌸</h2>
        
        <div class="btn-container" id="container">
            <button id="yesBtn" onclick="nextPage()">ТИЙМ ♥</button>
            <button id="noBtn">ҮГҮЙ ✖</button>
        </div>
    </div>

    <div id="page2" class="card hidden">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=400" alt="Food" class="profile-img">
        <h2> 🥰 Яг хоолоо идчихээд л салхилая хоолоо сонгоорой kiss kiss</h2>
        
        <div class="food-options">
            <div class="food-item" onclick="selectFood('Бургер 🍔')">
                <span>🍔</span>
                <p>Бургер</p>
            </div>
            <div class="food-item" onclick="selectFood('Пицца 🍕')">
                <span>🍕</span>
                <p>Пицца</p>
            </div>
            <div class="food-item" onclick="selectFood('Жантай гоймон')">
                <span>🍜</span>
                <p>Жантай гоймон</p>
            </div>
            <div class="food-item" onclick="selectFood('Намайг')">
                <span>👶</span>
                <p>Намайг</p>
            </div>
        </div>
    </div>

    <div id="page3" class="card hidden">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=400" alt="Love" class="profile-img">
        <h2>Ойлголооо удахгүй уулзацгаая хөөрхөнөө 💖</h2>
        <p id="finalMessage" style="margin-top: 18px; color: #ff66a3; font-weight: bold; font-size: 16px;"></p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const container = document.getElementById('container');
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const page3 = document.getElementById('page3');
        const finalMessage = document.getElementById('finalMessage');

        // Утсан дээр хуруу хүрэх (touchstart) эсвэл дарах үед зугтах функц
        function escapeButton(e) {
            e.preventDefault(); // Товчны үндсэн үйлдлийг зогсооно
            
            // Карт дотор чөлөөтэй зугтах хязгаарыг тодорхойлно
            // Утасны дэлгэц жижиг тул картнаасаа гаргахгүй байх нь чухал
            const padding = 20;
            const containerBounds = container.getBoundingClientRect();
            const btnBounds = noBtn.getBoundingClientRect();

            // Санамсаргүй шинэ байрлал бодох (Картны зүүн, баруун, дээд, доод тал руу үсрэнэ)
            const maxX = containerBounds.width - btnBounds.width;
            const maxY = 120; // Босоо чиглэлд үсрэх зай (дээшээ доошоо)

            let randomX = Math.random() * maxX;
            let randomY = (Math.random() * maxY) - (maxY / 2);

            // "Тийм" товчлуур дээр давхцаж очихоос сэргийлэх логик
            if (randomX < 100 && Math.abs(randomY) < 30) {
                randomX += 120; // Хэрэв "Тийм" товчтой хэт ойртвол баруун тийш түлхэнэ
            }

            // Шинэ байрлалыг оноож өгөх
            noBtn.style.right = 'auto'; // Эхний утгыг цуцална
            noBtn.style.left = randomX + 'px';
            noBtn.style.transform = `translateY(${randomY}px)`;
        }

        // Гар утсанд зориулсан мэдрэгч үйл явдлууд
        noBtn.addEventListener('touchstart', escapeButton);
        noBtn.addEventListener('click', escapeButton);
        // Компьютер дээр шалгах тохиолдолд:
        noBtn.addEventListener('mouseover', escapeButton);

        // ТИЙМ дарахад 2-р хуудас руу шилжих
        function nextPage() {
            page1.classList.add('hidden');
            page2.classList.remove('hidden');
        }

        // Хоол сонгоход 3-р хуудас руу шилжих
        function selectFood(foodName) {
            page2.classList.add('hidden');
            page3.classList.remove('hidden');
            finalMessage.innerText = `Хоёулаа ${foodName} идэхээр товлолоо! ✨`;
        }
    </script>
</body>
</html>
